<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Uber Chile — ¿Hasta dónde llego?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{
      --bg:#07070e;
      --s1:#0d0d1c;
      --s2:#111128;
      --border:#1c1c38;
      --border2:#252548;
      --blue:#1677ff;
      --blue-dim:#1145a8;
      --green:#00e096;
      --green-dim:#00573a;
      --red:#ff4d6a;
      --gold:#fbbf24;
      --text:#e8eaf6;
      --muted:#6b7280;
      --mono:'DM Mono',monospace;
      --sans:'Syne',sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    .app{max-width:480px;margin:0 auto;padding:0 0 80px}

    /* Tabs */
    .tabs { display:flex; align-items:center; gap:4px; padding:10px 20px 0; }
    .tab-btn { background:var(--s2); border:1px solid var(--border2); color:var(--muted); font-family:var(--mono); padding:6px 18px; border-radius:18px; margin-right:5px; cursor:pointer; }
    .tab-btn.active { background:var(--blue); color:#fff; }
    .brand { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--green); letter-spacing:2px; }

    /* Header */
    .header{
      padding:32px 20px 24px;
      border-bottom:1px solid var(--border);
      position:relative;
      overflow:hidden;
    }
    .header::before{
      content:'';position:absolute;top:-60px;right:-40px;
      width:220px;height:220px;border-radius:50%;
      background:radial-gradient(circle,rgba(22,119,255,.18) 0%,transparent 70%);
      pointer-events:none;
    }
    .uber-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--blue);color:#fff;
      font-family:var(--mono);font-size:10px;font-weight:500;
      letter-spacing:1px;padding:4px 10px;border-radius:4px;
      margin-bottom:14px;
    }
    .uber-badge svg{width:14px;height:14px;fill:currentColor}
    h1{font-size:clamp(30px,8vw,44px);font-weight:900;line-height:1;letter-spacing:-1.5px;margin-bottom:6px}
    h1 .hl{color:var(--blue)}
    .header-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px}

    /* Secciones (igual que original, omito para espacio...) */
    .section{padding:20px 20px 0}
    /* Copia aquí todo el CSS del archivo original hasta la línea de animaciones/keyframes... */
    /* ... */

    /* Resultado de pestañas secundarias */
    .tab-content{padding:32px 22px;}
    .mini-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;padding:13px 15px;}
    .mini-card strong{color:var(--blue)}
    .faq-row{padding:12px 0;}
  </style>
</head>

        UBER CHILE
      </div>
      <h1>¿Hasta dónde<br>llego con <span class="hl">$1.000?</span></h1>
      <p class="header-sub">Radio exacto · CLP · Santiago y regiones</p>
    </div>
